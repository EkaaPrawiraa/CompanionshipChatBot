services:
  neo4j:
    image: neo4j:5.26-community
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/yourpassword
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
    volumes:
      - neo4j_data:/data
      - ./infra/neo4j/schema:/schema   # mounts your .cypher files
      - ./infra/neo4j/migrations:/migrations

  postgres:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_USER: companion
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: companion_chatbot
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/000_init.sql
      - ./infra/postgres/pgvector_init.sql:/docker-entrypoint-initdb.d/010_pgvector_init.sql
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U companion -d companion_chatbot"]
      interval: 30s
      timeout: 10s
      retries: 3


volumes:
  neo4j_data:
  postgres_data:

  