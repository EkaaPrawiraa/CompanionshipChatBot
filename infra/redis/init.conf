# Redis key namespaces and TTL policy

# Active session state (full LangGraph ConversationState)
session:state:{session_id}           TTL: 2 hours

# Short-term message history (current session)
session:messages:{session_id}        TTL: 2 hours

# KG query result cache (avoids repeated Neo4j reads)
kg:context:{user_id}:{message_hash}  TTL: 5 minutes

# PHQ-9 in-progress state (mid-assessment)
assessment:inprogress:{session_id}   TTL: 30 minutes

# Rate limiting (per user, per hour)
ratelimit:messages:{user_id}         TTL: 1 hour

# Session activity heartbeat (inactivity detection)
session:heartbeat:{session_id}       TTL: 30 minutes (refreshed on each turn)
